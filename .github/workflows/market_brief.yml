name: SUBHA CAPITAL Market Brief

on:
  schedule:
    # All times UTC = IST - 5:30
    - cron: '15 3 * * 1-5'   # 8:45 AM IST  — Gift Nifty + Pre-market
    - cron: '30 3 * * 1-5'   # 9:00 AM IST  — Pre-open + Sector scan
    - cron: '0 4 * * 1-5'    # 9:30 AM IST  — ORB + Stock selection
    - cron: '15 4 * * 1-5'   # 9:45 AM IST  — FINNIFTY ORB + Options signal
  workflow_dispatch:           # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyotp requests pytz openpyxl

      - name: Generate market data
        env:
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          ANGEL_PIN: ${{ secrets.ANGEL_PIN }}
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name "SUBHA CAPITAL Bot"
          git config user.email "bot@subhacapital.com"
          git add data.json trading_journal.xlsx
          git diff --staged --quiet || git commit -m "Market data $(date '+%d-%b-%Y %H:%M IST')"
          git push
